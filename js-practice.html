<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <title>JS 基础知识练习</title>
 </head>
 <body>
     <h1>JavaScript 基础知识练习</h1>
     <p>按 F12 打开浏览器控制台查看运行结果</p >
     <script>
         // 1. 变量定义与变量类型
         let userName = "学生";       // 字符串类型
         let userAge = 20;           // 数字类型
         let isStudent = true;       // 布尔类型
         let score = null;           // null 类型
         let address;                // undefined 类型
         console.log("=== 1. 变量与类型 ===");
         console.log("姓名：", userName, "类型：", typeof userName);
         console.log("年龄：", userAge, "类型：", typeof userAge);
         console.log("是否学生：", isStudent, "类型：", typeof isStudent);
         console.log("分数：", score, "类型：", typeof score);
         console.log("地址：", address, "类型：", typeof address);
         // 2. 表达式
         console.log("\n=== 2. 表达式 ===");
         let a = 10, b = 3;
         console.log("a + b =", a + b);
         console.log("a - b =", a - b);
         console.log("a * b =", a * b);
         console.log("a / b =", a / b);
         console.log("a % b =", a % b);
         // 3. 流程控制
         console.log("\n=== 3. 流程控制 ===");
         if (userAge >= 18) {
             console.log("已成年");
         } else {
             console.log("未成年");
         }
         console.log("for 循环（1~5）：");
         for (let i = 1; i <= 5; i++) {
             console.log(i);
         }
         console.log("while 循环（1~3）：");
         let i = 1;
         while (i <= 3) {
             console.log(i);
             i++;
         }
         // 4. 函数
         console.log("\n=== 4. 函数 ===");
         function add(x, y) {
             return x + y;
         }
         console.log("add(5, 7) =", add(5, 7));
         const multiply = (x, y) => x * y;
         console.log("multiply(3, 4) =", multiply(3, 4));
         function judgeScore(score) {
             return score >= 60 ? "及格" : "不及格";
         }
         console.log("成绩判定：", judgeScore(85));
     </script>
 </body>
 </html>
